name: Daily AI News Report

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Generate report
        run: python scripts/generate_report.py --output "$RUNNER_TEMP/daily-ai-news.md"

      - name: Publish daily release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          report_date="$(date -u +%F)"
          tag="daily-${report_date}"
          title="Daily AI News - ${report_date}"
          notes_file="$RUNNER_TEMP/daily-ai-news.md"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "$title" \
              --notes-file "$notes_file" \
              --latest
          else
            gh release create "$tag" \
              --title "$title" \
              --notes-file "$notes_file" \
              --target "$GITHUB_SHA" \
              --latest
          fi
