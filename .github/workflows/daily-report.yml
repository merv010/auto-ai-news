name: Daily AI & Robotics News

on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC = 07:00 Malta time (UTC+2 summer)
  workflow_dispatch:        # manual trigger from Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Generate daily report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/generate_report.py --output daily-ai-news.json
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Upload JSON as Release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: daily-${{ env.DATE }}
          name: "Daily AI News - ${{ env.DATE }}"
          body: "Automated AI & Robotics digest for ${{ env.DATE }}"
          files: daily-ai-news.json

      - name: Deploy index.html to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          include_files: index.html
